name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      DATABASE_URL: mysql2://root:root@127.0.0.1:3306/planning_department_test

    steps:
      - uses: actions/checkout@v4

      - name: Start MySQL
        run: sudo systemctl start mysql

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Create database
        run: bin/rails db:create db:schema:load

      # The runner image ships a chromedriver in PATH that can drift out of
      # sync with its Chrome (e.g. driver 150 vs Chrome 151, which exits at
      # session creation). A PATH driver takes precedence over selenium-
      # manager, so remove it and let selenium-manager provision a matched
      # Chrome for Testing + driver pair (same setup system specs use locally).
      - name: Remove preinstalled ChromeDriver
        run: sudo rm -f /usr/bin/chromedriver /usr/local/bin/chromedriver

      - name: Run tests
        run: bundle exec rspec
